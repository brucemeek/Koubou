# Dream Oracle Google Play screenshots generated from the adjacent Dream_Oracle repo.

project:
  name: "Dream Oracle Android"
  output_dir: "../output/dream-oracle-android"
  device: "Android Pixel 9 Pro - Portrait"
  output_size: [1080, 1920]

defaults:
  background:
    type: "radial"
    colors: ["#0C1327", "#1A0B2E", "#050816"]
    center: ["50%", "12%"]

screenshots:
  dashboard:
    background:
      type: "radial"
      colors: ["#102240", "#1A0B2E", "#050816"]
      center: ["50%", "12%"]
    content:
      - type: "image"
        asset: "../../Dream_Oracle/apps/mobile_flutter/assets/backgrounds/background - dark.webp"
        position: ["50%", "50%"]
        scale: 1.25

      - type: "image"
        asset: "../../Dream_Oracle/apps/mobile_flutter/assets/backgrounds/starfield-overlay.webp"
        position: ["50%", "50%"]
        scale: 1.85

      - type: "text"
        content: "UNDERSTAND YOURSELF"
        position: ["50%", "8.2%"]
        size: 24
        font_family: "C:/AIDevelopment/Dream_Oracle/apps/mobile_flutter/assets/google_fonts/Poppins-SemiBold.ttf"
        color: "#67E8F9"
        weight: "normal"
        alignment: "center"
        anchor: "top-center"

      - type: "text"
        content: "Understand your dreams"
        position: ["50%", "11.8%"]
        size: 68
        font_family: "C:/AIDevelopment/Dream_Oracle/apps/mobile_flutter/assets/google_fonts/Poppins-ExtraBold.ttf"
        gradient:
          type: "linear"
          colors: ["#FFFFFF", "#DDD6FE", "#67E8F9"]
          direction: 90
        stroke_width: 1
        stroke_color: "#130A22CC"
        weight: "normal"
        alignment: "center"
        anchor: "top-center"
        max_width: 880
        line_height: 1.02

      - type: "text"
        content: "See patterns, moods, and guidance the moment you wake up."
        position: ["50%", "22.1%"]
        size: 22
        font_family: "C:/AIDevelopment/Dream_Oracle/apps/mobile_flutter/assets/google_fonts/Poppins-Regular.ttf"
        color: "#E9E8FF"
        alignment: "center"
        anchor: "top-center"
        max_width: 820
        line_height: 1.25

      - type: "image"
        asset: "../../Dream_Oracle/apps/mobile_flutter/build/app_store_screenshots_dark/dashboard.png"
        position: ["50%", "75%"]
        scale: 0.58
        frame: true

