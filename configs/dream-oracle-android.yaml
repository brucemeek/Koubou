# Dream Oracle Google Play screenshots generated from the adjacent Dream_Oracle repo.

project:
  name: "Dream Oracle Android"
  output_dir: "../output/dream-oracle-android"
  device: "Android Pixel 9 Pro - Portrait"
  output_size: [1080, 1920]

defaults:
  background:
    type: "radial"
    colors: ["#0072AC", "#4C1D95", "#1A0B2E"]
    center: ["18%", "16%"]

screenshots:
  dashboard:
    background:
      type: "radial"
      colors: ["#0072AC", "#4C1D95", "#1A0B2E"]
      center: ["16%", "14%"]
    content:
      - type: "image"
        asset: "../../Dream_Oracle/apps/mobile_flutter/assets/backgrounds/starfield-overlay.webp"
        position: ["50%", "50%"]
        scale: 1.9

      - type: "image"
        asset: "../../Dream_Oracle/apps/mobile_flutter/assets/backgrounds/Celestial-Moon-Dark.webp"
        position: ["86%", "13%"]
        scale: 0.3

      - type: "image"
        asset: "../../Dream_Oracle/apps/mobile_flutter/assets/badges/Cosmic-Sage-Badge-Icon.webp"
        position: ["10%", "10%"]
        scale: 0.07

      - type: "text"
        content: "DREAM ORACLE"
        position: ["16%", "8.3%"]
        size: 20
        font_family: "arialbd.ttf"
        color: "#67E8F9"
        weight: "bold"
        alignment: "left"
        anchor: "top-left"

      - type: "text"
        content: "Decode what\nyour dreams mean"
        position: ["8%", "16%"]
        size: 72
        font_family: "arialbd.ttf"
        gradient:
          type: "linear"
          colors: ["#ffffff", "#DDD6FE", "#67E8F9"]
          direction: 15
        stroke_width: 2
        stroke_color: "#1A0B2ECC"
        weight: "bold"
        alignment: "left"
        anchor: "top-left"
        line_height: 1.02

      - type: "text"
        content: "Spot patterns, daily guidance, and hidden meaning the moment you open the app."
        position: ["8%", "34.5%"]
        size: 24
        font_family: "arial.ttf"
        color: "#E9E8FF"
        alignment: "left"
        anchor: "top-left"
        max_width: 410
        line_height: 1.28

      - type: "image"
        asset: "../../Dream_Oracle/apps/mobile_flutter/build/app_store_screenshots/dashboard.png"
        position: ["67%", "59%"]
        scale: 0.53
        frame: true

  dreams:
    background:
      type: "radial"
